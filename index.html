<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lofi Pomodoro - Huzurlu bir ortamda odaklan. Kum saatine dokun ve zamanlayıcıyı başlat.">
    <title>Lofi Pomodoro ⏳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Living Scene Container -->
    <div id="scene-container">
        <!-- Background Image with Breathing Animation -->
        <div id="scene-bg"></div>

        <!-- Animated Cloud Overlays -->
        <div class="cloud-layer cloud-1"></div>
        <div class="cloud-layer cloud-2"></div>
        <div class="cloud-layer cloud-3"></div>

        <!-- Canvas for Particles (stars, dust, sand) -->
        <canvas id="particle-canvas"></canvas>

        <!-- Ambient light effects -->
        <div id="lamp-glow"></div>
        <div id="screen-glow"></div>
        <div id="hourglass-ambient-glow"></div>

        <!-- Hourglass Interactive Hotspot -->
        <div id="hourglass-hotspot" title="Kum saatine dokun ve Pomodoro'yu başlat!">
            <div class="hotspot-ring"></div>
            <div class="hotspot-ring ring-2"></div>
            <div class="hotspot-ring ring-3"></div>
        </div>

        <!-- Vignette Overlay -->
        <div id="vignette"></div>
    </div>

    <!-- Pomodoro Timer Panel -->
    <div id="timer-panel" class="hidden">
        <div class="timer-glass">
            <button id="close-panel" aria-label="Kapat">✕</button>
            
            <div id="timer-mode-label">ODAKLAN</div>
            
            <div id="timer-display">
                <span id="minutes">25</span>
                <span class="timer-colon">:</span>
                <span id="seconds">00</span>
            </div>

            <div id="timer-progress-ring">
                <svg viewBox="0 0 200 200">
                    <circle class="progress-bg" cx="100" cy="100" r="90"/>
                    <circle id="progress-circle" class="progress-fg" cx="100" cy="100" r="90"/>
                </svg>
            </div>

            <div id="timer-controls">
                <button id="btn-reset" class="control-btn" title="Sıfırla">
                    <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
                <button id="btn-start" class="control-btn primary" title="Başlat / Duraklat">
                    <svg id="icon-play" viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" width="28" height="28" style="display:none"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="btn-skip" class="control-btn" title="Atla">
                    <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>

            <div id="session-info">
                <div id="session-dots"></div>
                <div id="session-count">Oturum 1/4</div>
            </div>

            <div id="mode-switcher">
                <button class="mode-btn active" data-mode="work">Çalışma</button>
                <button class="mode-btn" data-mode="short">Kısa Mola</button>
                <button class="mode-btn" data-mode="long">Uzun Mola</button>
            </div>
        </div>
    </div>

    <!-- Notification Sound -->
    <div id="notification-flash" class="hidden"></div>

    <script src="app.js"></script>
</body>
</html>
